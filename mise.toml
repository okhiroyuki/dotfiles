# メジャー固定にして、マシン・時期によるバージョンずれ（再現性の低下）を防ぐ。
# メジャー内の最新パッチは取り込まれる。新しいメジャーへ上げたいときはここを更新する。
[tools]
node = "22"
pnpm = "11"
python = "3.14"
# lint/フック系ツール。CI・ローカル・gitフックが同じバージョンを共有する。
dprint = "0.55"
shellcheck = "0.11.0"
actionlint = "1"
yamllint = "1"
lefthook = "1"
# yamllintはpipxバックエンドでインストールされるが、システムにpipxが無い環境では
# mise管理下のuv(uvx)がpipxの代替実行手段として使われるため、依存として明示する。
uv = "0"

# チェックの定義はこの mise.toml が単一の真実の源。
# CI（.github/workflows/check.yml）も lefthook も同じ `mise run` を呼ぶ。

[tasks.setup]
description = "gitフックを有効化する（初回のみ）"
run = "lefthook install"

[tasks.fmt]
description = "dprintでフォーマットを適用する"
run = "dprint fmt"

[tasks."lint:dprint"]
description = "dprintのフォーマット差分をチェックする"
run = "dprint check"

[tasks."lint:yaml"]
description = "yamllintでYAMLをチェックする"
run = "yamllint --strict -c .yamllint ."

[tasks."lint:shell"]
description = "shellcheckでbashスクリプトをチェックする"
run = "shellcheck scripts/*.sh"

[tasks."lint:actions"]
description = "actionlintでGitHub Actionsをチェックする"
run = "actionlint"

[tasks.lint]
description = "全lintを実行する"
depends = ["lint:dprint", "lint:yaml", "lint:shell", "lint:actions"]

[tasks.test]
description = "scappleのテストと型検査を実行する"
dir = "tools/scapple"
run = "pnpm install --frozen-lockfile && pnpm exec tsc --noEmit && pnpm test"

[tasks.check]
description = "CI相当の全チェック（lint + test）"
depends = ["lint", "test"]
