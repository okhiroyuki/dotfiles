---
# lefthook でコミット/プッシュ時にチェックを走らせる。
# チェックの定義は mise.toml が単一の真実の源で、CI も同じ mise タスクを呼ぶ。
# 初回のみ `mise install && lefthook install` でフックを有効化する。
pre-commit:
  parallel: true
  commands:
    lint:
      run: mise run lint

pre-push:
  commands:
    test:
      # scapple 配下を変更した push だけテストを走らせる。
      # 無関係な push（rules/skills 等）では skip され高速化する。取りこぼしは CI が担保する。
      glob: "tools/scapple/**"
      run: mise run test
